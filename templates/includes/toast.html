{% load static %}

<!-- Toast Container - Incluir em qualquer página que precise de notificações -->
<div x-data="toastManager()" 
     @show-toast.window="show($event.detail.type, $event.detail.message)"
  class="toast toast-top toast-center z-[9999]" 
     x-cloak>
  <div x-show="showToast" 
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 transform -translate-y-4"
       x-transition:enter-end="opacity-100 transform translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 transform translate-y-0"
       x-transition:leave-end="opacity-0 transform -translate-y-4"
       class="alert shadow-lg max-w-md"
       :class="{
         'alert-success': toastType === 'success',
         'alert-error': toastType === 'error',
         'alert-warning': toastType === 'warning',
         'alert-info': toastType === 'info'
       }">
    <div class="flex items-center gap-2">
      <i :class="{
        'fas fa-check-circle': toastType === 'success',
        'fas fa-times-circle': toastType === 'error',
        'fas fa-exclamation-triangle': toastType === 'warning',
        'fas fa-info-circle': toastType === 'info'
      }"></i>
      <span x-text="toastMessage"></span>
    </div>
    <button @click="hide()" 
            class="btn btn-sm btn-ghost btn-circle"
            x-show="toastType === 'error' || toastType === 'warning'">
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>
